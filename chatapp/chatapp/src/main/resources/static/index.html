<!DOCTYPE html>
<html>
<head>
    <title>PulseChat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">

    <div class="login-box">

        <p class="eyebrow">Live group chat</p>
        <h2>Welcome to PulseChat</h2>
        <p class="tagline">A brighter, faster chat experience with a fresh look.</p>

        <input type="text"
               id="usernameInput"
               placeholder="Choose your name">

        <input type="password"
               id="passwordInput"
               placeholder="Enter your password">

        <button onclick="joinChat('ADMIN')">
            Admin Login
        </button>

        <button onclick="joinChat('USER')">
            User Login
        </button>

    </div>

</div>

<!-- CHAT APP -->
<div class="app" id="chatApp" style="display:none;">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <div class="top-bar">
            <h3 id="myName">User</h3>
        </div>

        <div class="search-box">
            <input type="text"
                   id="searchUserInput"
                   autocomplete="off"
                   placeholder="Search user">
            <div id="suggestionBox"
                 class="suggestion-box"></div>
        </div>

        <div id="usersList"
             class="users-list">
        </div>

        <div id="adminPanel"
             class="admin-panel"
             style="display:none;">
            <button type="button"
                    id="deleteUserBtn">
                Delete selected user
            </button>
            <button type="button"
                    id="makeAdminBtn">
                Make selected user admin
            </button>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="chat-header">
            <div>
                <h3 id="chatUser">
                    Private Chat Room
                </h3>
                <input type="hidden"
                       id="recipientInput">
            </div>
            <button type="button"
                    id="deleteHeaderBtn"
                    class="icon-btn"
                    title="Delete selected user"
                    aria-label="Delete selected user">
                🗑️
            </button>
        </div>

        <div id="messages"
             class="messages">
        </div>

        <div class="bottom-bar">

            <input type="text"
                   id="message"
                   placeholder="Type message">

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script src="app.js"></script>

</body>
</html>
